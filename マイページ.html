<!DOCTYPE html>
<html lang="ja">
<head>
 <meta charset="UTF-8">
 <title>マイページ</title>

 <link
 href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
 rel="stylesheet">

  <link
  href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
   rel="stylesheet">

 <style>
 html{
    scroll-behavior:smooth;
 }

 section{
    scroll-margin-top:80px;
    min-height:500px;
 }
 </style>

</head>

<body>

 <!-- Navbar -->
     <nav class="navbar navbar-expand-lg  navbar-dark"
	  style="background-color:  #3b785a;">
        <div class="container-fluid px-1 flex-column">

            <!-- 上段 -->
         <div class="d-flex align-items-center py-3">
          <!-- ロゴ -->
             <div class="navbar-nav flex-row align-items-center me-5">
             <a class="navbar-brand nav-link fs-4 me-5" href="index.html">
                <i class="bi bi-house-fill"></i>
             </a>

			        <a class="text-center text-white fs-4" href="マイページ.html">
				       <i class="bi bi-person-circle"></i>
			          </a>
             </div>

            <!-- 検索 -->
         <form class="d-flex w-75">

            <input class="form-cotrol-lg"
              type="search"
              placeholder="地域や料理を検索"
              style="width: 500px">

            <button class="btn btn-outline-light ms-2"
             type="submit">
            
             <i class="bi bi-search">
             </i>
            </button>
          </form>

         </div>
            
         <div class="d-flex align-items-center">

         <!-- メニュー -->
         <div class="text-center text-white mx-auto flex-row ">

		     <a class="text-center text-white px-4" href="地域2.html">
			     地域
		       </a>

		    <a class="text-center text-white px-4" href="#食文化">
			     食文化
		      </a>

		     <a class="text-center text-white px-4" href="#ランキング">
		    	ランキング
		     </a>

		     <a class="text-center text-white px-4" href="#投稿">
			   投稿
		     </a>
	     </div>
     </div>
     </nav>

     </div>
   </div>
 </nav>

 <!-- メインコンテンツエリア -->
 <main style="max-width: 900px; margin: 0 auto; padding: 40px 20px;">
        
        <!-- プロフィールエリア -->
        <div style="display: flex; align-items: center; gap: 60px;">
            
            <!-- 左側：超でかいアイコン（画像が設定されたらここに表示されます） -->
            <div id="profileImageContainer" style="width: 200px; height: 200px; min-width: 200px; background-color: #e9f2ec; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 6px solid #3b785a; box-shadow: 0 8px 20px rgba(0,0,0,0.1); overflow: hidden;">
                <i id="defaultIcon" class="bi bi-person-fill" style="font-size: 110px; color: #3b785a;"></i>
                <img id="profileImagePreview" style="display: none; width: 100%; height: 100%; object-fit: cover;">
            </div>

            <!-- 右側：名前・ID・投稿数・自己紹介・そして設定ボタン -->
            <div>
                <h1 id="displayUserName" style="font-size: 48px; font-weight: bold; margin: 0 0 15px 0; color: #2c3e50; letter-spacing: 2px;">
                    ユーザー名
                </h1>
                
                <p style="font-size: 20px; color: #7f8c8d; margin: 0 0 10px 0;">
                    @user_id_1234
                </p>

                <!-- ✨ 日本語表記で分かりやすい投稿数表示 -->
                <div style="margin-bottom: 20px; font-size: 16px; color: #7f8c8d;">
                    投稿数 <strong style="font-size: 24px; color: #3b785a; font-family: sans-serif; vertical-align: middle;">12</strong>
                </div>
                
                <p id="displayComment" style="font-size: 16px; color: #555; max-width: 500px; line-height: 1.8; margin: 0 0 25px 0;">
                    ここに自己紹介文や趣味、お気に入りの地域などのひとことを自由に書けるようにします。
                </p>

                <!-- ⚙️ 設定を開くボタン -->
                <button type="button" class="btn text-white" data-bs-toggle="modal" data-bs-target="#settingsModal" style="background-color: #3b785a; border-radius: 25px; padding: 10px 25px; font-weight: bold; box-shadow: 0 4px 12px rgba(59, 120, 90, 0.2);">
                    <i class="bi bi-gear-fill me-2"></i>プロフィール・設定を編集
                </button>
            </div>

        </div>

        <!-- 📄 ボタンを押した時だけフワッと浮き出る設定画面（Modal） -->
        <div class="modal fade" id="settingsModal" tabindex="-1" aria-labelledby="settingsModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content" style="border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
                    
                    <!-- モーダルのヘッダー（緑色の帯） -->
                    <div class="modal-header" style="background-color: #3b785a; color: white; border-top-left-radius: 14px; border-top-right-radius: 14px;">
                        <h5 class="modal-title" id="settingsModalLabel">
                            <i class="bi bi-person-gear me-2"></i>プロフィールの編集
                        </h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    
                    <!-- モーダルの本体 -->
                    <div class="modal-body p-4">
                        
                        <!-- 1. ユーザー名の変更 -->
                        <div class="mb-4">
                            <label class="form-label fw-bold" style="color: #2c3e50;">
                                <i class="bi bi-person-fill me-1" style="color: #3b785a;"></i> ユーザー名の変更
                            </label>
                            <input type="text" id="inputUserName" class="form-control" value="ユーザー名" placeholder="新しいユーザー名を入力">
                        </div>

                        <!-- 2. アカウント写真の変更 -->
                        <div class="mb-4">
                            <label class="form-label fw-bold" style="color: #2c3e50;">
                                <i class="bi bi-image me-1" style="color: #3b785a;"></i> アカウント写真の変更
                            </label>
                            <input class="form-control" type="file" id="inputProfileImage" accept="image/*">
                            <div class="form-text">JPG、PNG形式の画像がアップロードできます。</div>
                        </div>

                        <!-- 3. コメントの変更 -->
                        <div class="mb-3">
                            <label class="form-label fw-bold" style="color: #2c3e50;">
                                <i class="bi bi-chat-left-text-fill me-1" style="color: #3b785a;"></i> コメント（自己紹介）の変更
                            </label>
                            <textarea id="inputComment" class="form-control" rows="3" placeholder="お気に入りの地域や食文化など、自由に自己紹介を書いてみましょう！">ここに自己紹介文や趣味、お気に入りの地域などのひとことを自由に書けるようにします。</textarea>
                        </div>

                    </div>
                    
                    <!-- モーダルのフッター（ボタン） -->
                    <div class="modal-footer" style="border-top: 1px solid #eee;">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" style="border-radius: 20px; padding: 6px 20px;">閉じる</button>
                        <!-- 確実にプログラムが動くようにID（btnSaveChanges）をつけました -->
                        <button type="button" id="btnSaveChanges" class="btn text-white" style="background-color: #3b785a; border-radius: 20px; padding: 6px 20px; font-weight: bold;">変更を保存</button>
                    </div>

                </div>
            </div>
        </div>

    </main>

 <!-- フッターエリア -->
 <footer class="text-center text-white py-4 mt-5" style="background-color:#3b785a;">
     <p class="mb-1 fw-bold">
         食の旅
     </p>
     <p class="mb-0 small">
         Made in 2026 
     </p>
 </footer>

 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

 <!-- 🛠️ 本当に文字と写真が変わる魔法のプログラム（JavaScript） -->
 <script>
 document.getElementById('btnSaveChanges').addEventListener('click', function() {
     // 1. 入力された値（名前・コメント）を取得する
     const newName = document.getElementById('inputUserName').value;
     const newComment = document.getElementById('inputComment').value;

     // 2. メイン画面の文字を書き換える
     if(newName.trim() !== "") {
         document.getElementById('displayUserName').innerText = newName;
     }
     if(newComment.trim() !== "") {
         document.getElementById('displayComment').innerText = newComment;
     }

     // 3. 写真が選ばれていたら、丸いアイコンにセットする
     const imageInput = document.getElementById('inputProfileImage');
     if (imageInput.files && imageInput.files[0]) {
         const reader = new FileReader();
         reader.onload = function(e) {
             // 元の人型アイコンを隠して、選んだ画像を表示する
             document.getElementById('defaultIcon').style.display = 'none';
             const previewImg = document.getElementById('profileImagePreview');
             previewImg.src = e.target.result;
             previewImg.style.display = 'block';
         }
         reader.readAsDataURL(imageInput.files[0]);
     }

     // 4. 設定画面（モーダル）を自動で閉じる
     const modalElement = document.getElementById('settingsModal');
     const modalInstance = bootstrap.Modal.getInstance(modalElement);
     modalInstance.hide();
 });
 </script>

</body>
</html>
